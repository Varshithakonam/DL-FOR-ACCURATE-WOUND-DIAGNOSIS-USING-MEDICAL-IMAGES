<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Wound Image Detection</title>
    <link href="https://cdn.bootcss.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.bootcss.com/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://cdn.bootcss.com/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdn.bootcss.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

    <script>
        function previewImage() {
            var preview = document.querySelector('#preview-image'); // get the image element
            var file = document.querySelector('#imagefile').files[0]; // get the selected file

            var reader = new FileReader(); // create a new FileReader object

            // set up the FileReader object to load the image file and update the preview image
            reader.onload = function() {
                preview.src = reader.result;
                preview.removeAttribute('hidden'); // show the preview image
            }

            // load the selected file as a data URL
            if (file) {
                reader.readAsDataURL(file);
            }
        }
    </script>

    <style>
        /* General Body Styles */
        body {
            margin: 0;
            background-color: #f4f4f9;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;  /* Prevent horizontal overflow */
        }

        h1, h2 {
            color: #2c3e50;
        }

        /* Image Container */
        .image img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        nav {
          background-color: #353636;
      }
  
      .topnav {
          overflow: hidden;
          background-color: #353636;
      }
  
      .topnav a {
          float: left;
          color: #f2f2f2;
          text-align: center;
          padding: 14px 16px;
          text-decoration: none;
          font-size: 17px;
          margin-right: 50px;
      }
  
      .topnav-right {
          float: right;
      }
      .topnav-left {
          float: left;
      }
      .topnav-left  a{
        color: white;
        font-size: 25px;
        font-weight: bolder;
      }
  

        /* Form and Content Styling */
        .container {
            margin-top: 6rem;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
            padding: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .login100-form-title-1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .input100 {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        .container-login100-form-btn {
            margin-top: 20px;
            text-align: center;
        }

        .btn {
            background-color: #3498db;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        #preview-image {
            max-width: 200px;
            height: 200px;
            margin-top: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
    </style>

</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" id="lg">Wound Diagnosis</a>
      
    </div>
    <div class="topnav-right">
      <a href="{{ url_for('main') }}" id="lg">Home</a>
      <a href="{{ url_for('login') }}" id="lg">Login</a>
    </div>
  </nav>
    <div class="image">
        <img src="{{ url_for('static', filename='w3.jpg')}}" alt="Wound Image" />
    </div>

    <div class="container">
        <h1 class="text-center">Deep Learning for Accurate Wound Diagnosis from Medical Images</h1>
        
        
        <form class="login100-form validate-form" action="{{ url_for('predicted') }}" method="POST" enctype="multipart/form-data">
            <div class="wrap-input100 validate-input m-b-26">
                <label for="imagefile" class="login100-form-title-1">Upload Image:</label>
                <input class="input100" type="file" name="imagefile" id="imagefile" accept=".png, .jpg, .jpeg" onchange="previewImage();" required>   
            </div>

            <div>
                <img id="preview-image" src="" alt="Preview Image" hidden>
            </div>

            <div class="container-login100-form-btn">
                <button class="btn" type="submit">Submit</button>
            </div>
        </form>
    </div>

</body>
</html>
