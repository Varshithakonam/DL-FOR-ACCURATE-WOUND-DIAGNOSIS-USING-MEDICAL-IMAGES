<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wound Image Detection</title>
    <link href="https://cdn.bootcss.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* General Body Styles */
        body {
            margin: 0;
            background-color: #f4f4f9;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;  /* Prevent horizontal overflow */
        }

        h1, h2 {
            color: #2c3e50;
        }

        /* Image Container */
        .image img {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        nav {
          background-color: #353636;
      }
  
      .topnav {
          overflow: hidden;
          background-color: #353636;
      }
  
      .topnav a {
          float: left;
          color: #f2f2f2;
          text-align: center;
          padding: 14px 16px;
          text-decoration: none;
          font-size: 17px;
          margin-right: 50px;
      }
  
      .topnav-right {
          float: right;
      }
      .topnav-left {
          float: left;
      }
      .topnav-left  a{
        color: white;
        font-size: 25px;
        font-weight: bolder;
      }
      img{ 
   width:100%; 
   height:350px; 
  }
.image{
   width:100%; 
   height:150px; 
} 
 h1{
    text-align:center;
    color:black;
  }

      .container{
   margin-top: 12rem;
}

.imgpred{
       width:300px; 
       height:300px;
}
.container2{
      font-size: 150%;
}

.link ul li a{
color:black;
font-size:19px;
margin-left: 25px;
text-decoration: none;
font-weight: bold;

}

.link ul li a:hover {
  color: white;
   text-decoration: none;

}
    </style>

</head>
<body>
  <nav class="topnav">
    <div class="topnav-left">
      <a href="/" id="lg">Wound Diagnosis</a>
      
    </div>
    <div class="topnav-right">
      <a href="{{ url_for('index') }}" id="lg">Prediction</a>
      <a href="{{ url_for('performance') }}" id="lg">Performance</a>
      <a href="{{ url_for('logout') }}" id="lg">Logout</a>
    </div>
  </nav>
    <div class="image">
        <img src="{{ url_for('static', filename='w2.jpg')}}" alt="Wound Image" />
    </div>

    <div class="container">
		      
        <center> <h2 class="mb-4">Predictions: </h2></center>
          <center> 
        <img class="imgpred" src="{{img}}" alt="Uploaded Image">
          <br>
          <br>
          
           <div class= "container2">
           <h3>Results: {{ prediction }}</h3></div>
        </center>

</div>

</html>
