<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">   
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
    <title>Home</title>

    <style>
      /* Ensure full-screen background */
      body {
          margin: 0;
          padding: 0;
          position: relative;
          height: 100vh; /* Full height for body */
      }
  
      /* Video background styling */
      #bg-video {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          object-fit: cover; /* Ensures the video covers the whole background */
          z-index: -1; /* Sends the video behind the content */
      }
  
      span {
          color: black;
      }
  
      .text {
          text-align: center;
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          color: white;
      }
  
      p {
          font-size: 20px;
      }
  
      h1 {
          font-size: 50px;
          color: black;
      }
  
      nav {
          background-color: #353636;
      }
  
      .topnav {
          overflow: hidden;
          background-color: #353636;
      }
  
      .topnav a {
          float: left;
          color: #f2f2f2;
          text-align: center;
          padding: 14px 16px;
          text-decoration: none;
          font-size: 17px;
          margin-right: 50px;
      }
  
      .topnav-right {
          float: right;
      }
      .topnav-left {
          float: left;
      }
      .topnav-left  a{
        color: white;
        font-size: 25px;
        font-weight: bolder;
      }
  
      button a {
          text-decoration: none;
          font-size: 17px;
          color: black;
      }
  
      button a:hover {
          color: black;
          text-decoration: none;
      }
  
      button {
          width: 150px;
          margin: 5px;
      }
    </style>
  </head>
  
  <body>
    <form>
      <!-- Navigation Bar -->
      <nav class="topnav">
        <div class="topnav-left">
          <a href="/" id="lg">Wound Diagnosis</a>
          
        </div>
        <div class="topnav-right">
          <a href="{{ url_for('main') }}" id="lg">Home</a>
          <a href="{{ url_for('login') }}" id="lg">Login</a>
        </div>
      </nav>
  
      <!-- Text Overlay -->
      <div class="text">
        <h1 ><span style="color: white;">DL for Accurate Wound Diagnosis from Medical Images</span></h1>
      </div>
  
      <!-- Background Video -->
      <video autoplay muted loop id="bg-video">
          <source src="{{ url_for('static', filename='p5.mp4') }}" type="video/mp4">
          <source src="{{ url_for('static', filename='p4.webm') }}" type="video/webm">
          <source src="{{ url_for('static', filename='p4.ogg') }}" type="video/ogg">
          Your browser does not support the video tag.
      </video>
    </form>
  </body>
</html>
